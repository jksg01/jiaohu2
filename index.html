<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>响应式导航网站示例</title>
<style>
/* -------- Reset -------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body, html {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    scroll-behavior: smooth;
}

/* -------- Layout -------- */
.container {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background-color: #1e1e2f;
    color: #fff;
    position: sticky;
    top: 0;
    height: 100vh;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 10px;
    transition: transform 0.3s ease-in-out;
    z-index: 1000;
}
.sidebar.hidden {
    transform: translateX(-260px);
}
.sidebar .logo {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 40px;
    text-align: center;
}
.sidebar nav button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: #fff;
    font-size: 16px;
    padding: 12px 15px;
    text-align: left;
    cursor: pointer;
    margin-bottom: 8px;
    border-radius: 6px;
    transition: background 0.2s;
}
.sidebar nav button.active,
.sidebar nav button:hover {
    background-color: #3e3e5e;
}

/* Hamburger for mobile */
.hamburger {
    display: none;
    position: fixed;
    top: 15px;
    left: 15px;
    width: 30px;
    height: 22px;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 1100;
}
.hamburger span {
    display: block;
    height: 4px;
    width: 100%;
    background-color: #1e1e2f;
    border-radius: 2px;
}

/* Main content */
.main {
    flex: 1;
    background-color: #f5f5f5;
    padding: 20px;
}

/* Search area */
.search-area {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}
.search-area select,
.search-area input[type="text"] {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}
.search-area input[type="text"] {
    flex: 1;
}

/* Category sections */
.category-section {
    margin-bottom: 50px;
}
.category-section h2 {
    font-size: 22px;
    margin-bottom: 15px;
    color: #333;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}
.tabs button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    background-color: #ddd;
    cursor: pointer;
    transition: background 0.2s;
}
.tabs button.active {
    background-color: #1e90ff;
    color: #fff;
}

/* Cards grid */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
    gap: 20px;
}
.card {
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: flex-start;
    padding: 15px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}
.card-icon {
    font-size: 32px;
    margin-right: 15px;
    color: #1e90ff;
}
.card-content h3 {
    font-size: 18px;
    margin-bottom: 5px;
}
.card-content p {
    font-size: 14px;
    color: #666;
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        height: 100%;
        left: 0;
        top: 0;
    }
    .hamburger {
        display: flex;
    }
    .main {
        padding: 20px 10px;
    }
}
</style>
</head>
<body>

<!-- Hamburger -->
<div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar hidden" id="sidebar">
        <div class="logo">MyLogo</div>
        <nav id="sidebarNav">
            <button class="active" data-target="cat1">分类一</button>
            <button data-target="cat2">分类二</button>
            <button data-target="cat3">分类三</button>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="main" id="mainContent">
        <!-- Search -->
        <div class="search-area">
            <select id="searchEngine">
                <option value="https://www.baidu.com/s?wd=">百度</option>
                <option value="https://www.google.com/search?q=">谷歌</option>
                <option value="https://www.bing.com/search?q=">必应</option>
            </select>
            <input type="text" id="searchInput" placeholder="输入搜索内容">
            <button id="searchBtn">搜索</button>
        </div>

        <!-- Category Sections -->
        <section class="category-section" id="cat1">
            <h2>分类一</h2>
            <div class="tabs">
                <button class="active" data-tab="tab1-1">二级1-1</button>

            </div>

                        <div class="card-icon">📄</div>
                        <div class="card-content">
                            <h3>卡片 1</h3>
                            <p>这是卡片描述文本。</p>
                        </div>
                    </div>
                    <div class="card" onclick="window.open('https://example.com','_blank')">
                        <div class="card-icon">📄</div>
                        <div class="card-content">
                            <h3>卡片 2</h3>
                            <p>这是卡片描述文本。</p>
                        </div>
                    </div>
                </div>
                <div class="cards" data-tab-content="tab1-2" style="display:none;">
                    <div class="card" onclick="window.open('https://example.com','_blank')">
                        <div class="card-icon">📄</div>
                        <div class="card-content">
                            <h3>卡片 3</h3>
                            <p>这是卡片描述文本。</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="category-section" id="cat2">
            <h2>分类二</h2>
            <div class="tabs">
                <button class="active" data-tab="tab2-1">二级2-1</button>
                <button data-tab="tab2-2">二级2-2</button>
            </div>
            <div class="cards-container">
                <div class="cards" data-tab-content="tab2-1">
                    <div class="card" onclick="window.open('https://example.com','_blank')">
                        <div class="card-icon">📊</div>
                        <div class="card-content">
                            <h3>卡片 4</h3>
                            <p>这是卡片描述文本。</p>
                        </div>
                    </div>
                </div>
                <div class="cards" data-tab-content="tab2-2" style="display:none;">
                    <div class="card" onclick="window.open('https://example.com','_blank')">
                        <div class="card-icon">📊</div>
